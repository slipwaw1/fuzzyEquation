<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор нечітких логічних рівнянь</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Nunito:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');

:root {
  --sky:    #e8f4fd;
  --sky2:   #d0e8f8;
  --sky3:   #b8daef;
  --blue:   #2176ae;
  --blue2:  #1a5f8a;
  --blue3:  #0d3d5c;
  --accent: #1eaae0;
  --teal:   #0fa3b1;
  --low:    #d94f4f;
  --med:    #d4870a;
  --high:   #2a9946;
  --text:   #0d2137;
  --text2:  #3a5570;
  --text3:  #6a8fa8;
  --white:  #ffffff;
  --border: #c0d8ec;
  --shadow: 0 2px 16px rgba(33,118,174,0.10);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  background: linear-gradient(140deg,#daeef9 0%,#eef6fb 55%,#d4eaf7 100%);
  min-height:100vh;
  font-family:'Nunito',sans-serif;
  color:var(--text);
}

/* ── Header ── */
header {
  background:linear-gradient(90deg,var(--blue3),var(--blue2) 60%,var(--blue));
  padding:1.1rem 2.5rem;
  display:flex;
  align-items:center;
  gap:1.2rem;
  box-shadow:0 3px 20px rgba(13,61,92,.25);
  position:sticky;
  top:0;
  z-index:100;
}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:#fff}
.tagline{font-size:12px;color:rgba(255,255,255,.5);font-family:'Fira Code',monospace;letter-spacing:.06em}


/* ── Layout ── */
.main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 3rem}

/* ── Step card ── */
.step-card {
  background:var(--white);
  border:1px solid var(--border);
  border-radius:16px;
  box-shadow:var(--shadow);
  padding:1.5rem 1.75rem;
  margin-bottom:1.5rem;
  animation:fadeUp .35s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.step-label {
  font-family:'Fira Code',monospace;
  font-size:10.5px;
  font-weight:500;
  color:var(--text3);
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:1rem;
  display:flex;
  align-items:center;
  gap:8px;
}
.step-label::before{content:'';display:block;width:18px;height:2px;background:var(--accent);border-radius:2px}

/* ── Fields ── */
.row{display:flex;gap:1.5rem;align-items:flex-end;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:5px}
.field label,.flabel{font-size:12px;color:var(--text2);font-weight:600;letter-spacing:.03em}
.field input[type=number]{
  width:72px;background:var(--sky);border:1.5px solid var(--sky3);
  border-radius:9px;padding:8px 10px;font-size:15px;
  font-family:'Fira Code',monospace;color:var(--blue3);font-weight:500;
  outline:none;transition:border-color .2s,box-shadow .2s
}
.field input[type=number]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,170,224,.15)}

.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:600px){.meta-grid{grid-template-columns:1fr}}
.meta-row{display:flex;flex-direction:column;gap:5px}
.meta-row label{font-size:12px;color:var(--text2);font-weight:600}
.meta-row input[type=text]{
  background:var(--sky);border:1.5px solid var(--sky3);border-radius:9px;
  padding:8px 12px;font-size:13px;font-family:'Nunito',sans-serif;
  color:var(--text);outline:none;transition:border-color .2s;width:100%
}
.meta-row input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,170,224,.15)}

/* ── Buttons ── */
.btn{
  border:none;border-radius:10px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:700;
  font-size:13.5px;padding:10px 22px;transition:all .2s;letter-spacing:.02em
}
.btn-blue{background:linear-gradient(135deg,var(--accent),var(--blue));color:#fff;
  box-shadow:0 3px 12px rgba(33,118,174,.28)}
.btn-blue:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(33,118,174,.35)}
.btn-go{background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;
  font-size:15px;padding:12px 32px;box-shadow:0 4px 16px rgba(15,163,177,.30)}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(15,163,177,.40)}
.btn-ghost{background:var(--sky);color:var(--blue2);border:1.5px solid var(--sky3)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--sky2)}

/* ── Table ── */
.tbl-wrap{overflow-x:auto}
table.mx{border-collapse:separate;border-spacing:0;width:100%;min-width:max-content}
table.mx th{
  background:linear-gradient(180deg,var(--blue),var(--blue2));
  color:#fff;font-family:'Fira Code',monospace;font-size:12px;font-weight:500;
  padding:10px 18px;white-space:nowrap;letter-spacing:.05em;text-align:left
}
table.mx th:first-child{border-radius:12px 0 0 0}
table.mx th:last-child{border-radius:0 12px 0 0}
table.mx td{border-bottom:1px solid var(--sky2);border-right:1px solid var(--sky2);padding:0}
table.mx td:last-child{border-right:none}
table.mx td.num{
  background:var(--sky);font-family:'Fira Code',monospace;font-size:12px;
  color:var(--text3);text-align:center;padding:0 12px;width:40px;
  border-right:1px solid var(--sky3)
}
/* band colours */
table.mx tr.band-low  td{background:rgba(217,79,79,.05)}
table.mx tr.band-med  td{background:rgba(212,135,10,.05)}
table.mx tr.band-high td{background:rgba(42,153,70,.05)}
table.mx tr.band-low  td.num{background:rgba(217,79,79,.13)}
table.mx tr.band-med  td.num{background:rgba(212,135,10,.13)}
table.mx tr.band-high td.num{background:rgba(42,153,70,.13)}
table.mx tr:hover td{filter:brightness(.97)}

table.mx td input[type=text]{
  border:none;background:transparent;font-size:13px;
  font-family:'Nunito',sans-serif;color:var(--text);
  padding:9px 14px;width:100%;min-width:90px;outline:none;transition:background .15s
}
table.mx td input[type=text]:focus{background:rgba(30,170,224,.09);border-radius:6px}
.qual-inp-low  {color:var(--low) !important;font-weight:700!important}
.qual-inp-med  {color:var(--med) !important;font-weight:700!important}
.qual-inp-high {color:var(--high)!important;font-weight:700!important}

/* ── Equations ── */
.eq-block{background:var(--white);border:1.5px solid var(--border);border-radius:16px;box-shadow:var(--shadow);margin-bottom:1rem;overflow:hidden}
.eq-head{padding:.8rem 1.25rem;font-weight:700;font-size:13px;color:var(--blue2);
  background:var(--sky);border-bottom:1px solid var(--border)}
.eq-body{padding:1rem 1.5rem}
.eq-line{display:flex;flex-wrap:wrap;align-items:baseline;gap:0 4px;font-size:15px;line-height:2.2}
.mu{color:var(--teal);font-family:'Fira Code',monospace;font-size:14px;font-weight:500}
.sub{font-size:10px;vertical-align:sub}
.eq-eq{color:var(--text2);margin:0 8px;font-family:'Fira Code',monospace}
.op-and{color:var(--blue);font-family:'Fira Code',monospace;font-size:15px;font-weight:700;padding:0 3px}
.op-or{color:#d94f9a;font-family:'Fira Code',monospace;font-size:15px;font-weight:700;padding:0 3px}
.comma{color:var(--text3)}

.legend{display:flex;gap:1.5rem;flex-wrap:wrap;background:var(--sky);border:1px solid var(--border);
  border-radius:10px;padding:.7rem 1.2rem;margin-bottom:1rem}
.leg{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text2);font-family:'Fira Code',monospace}

.action-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem}

.hidden{display:none!important}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">FuzzyEquation</div>
    <div class="tagline">Інформаційна система для генерування нечітких логічних рівнянь</div>
  </div>

  <button class="btn btn-ghost" id="reset-btn" onclick="resetAll()" style="margin-left:auto;display:none;font-size:12.5px;padding:8px 18px">↺ Почати спочатку</button>
</header>

<div class="main">

  <!-- КРОК 1 -->
  <div class="step-card" id="step1">
    <div class="step-label">Крок 1 — Кількість критеріїв</div>
    <div class="row">
      <div class="field">
        <label>Кількість критеріїв X<sub>i</sub></label>
        <input type="number" id="nInd" min="1" max="10" value="0" placeholder="0">
      </div>
      <button class="btn btn-blue" onclick="doStep1()">Далі →</button>
    </div>
  </div>

  <!-- КРОК 2 -->
  <div class="step-card hidden" id="step2">
    <div class="step-label">Крок 2 — Назви критеріїв</div>
    <div class="meta-grid" id="meta-grid"></div>
    <div style="margin-top:1.25rem">
      <button class="btn btn-blue" onclick="doStep2()">Далі →</button>
    </div>
  </div>

  <!-- КРОК 3 -->
  <div class="step-card hidden" id="step3">
    <div class="step-label">Крок 3 — Матриця знань</div>

    <div class="tbl-wrap">
      <table class="mx" id="xi-table"></table>
    </div>
    <div style="margin-top:1.25rem" class="action-bar">
      <button class="btn btn-go" onclick="generate()">⚙ Згенерувати рівняння</button>
    </div>
  </div>

  <!-- РЕЗУЛЬТАТ -->
  <div class="hidden" id="eq-panel">
    <div class="step-label" style="margin-bottom:.75rem">Результат — нечіткі логічні рівняння</div>
    <div class="legend">
      <div class="leg"><span class="op-and">∧</span> кон'юнкція (І)</div>
      <div class="leg"><span class="op-or">∨</span> диз'юнкція (АБО)</div>
      <div class="leg"><span class="mu">μ</span> функція належності</div>
    </div>
    <div id="eq-output"></div>
  </div>

</div>

<script>
const BAND_CLASS = ['low','low','med','med','high','high'];
const BAND_QUAL  = ['низька','низька','середня','середня','висока','висока'];
const BAND_COLOR = ['var(--low)','var(--low)','var(--med)','var(--med)','var(--high)','var(--high)'];
const ORDER      = ['низька','середня','висока'];

let nInd = 0;

function show(id){ document.getElementById(id).classList.remove('hidden') }
function hide(id){ document.getElementById(id).classList.add('hidden') }

/* ── Крок 1 ── */
function doStep1(){
  const val = +document.getElementById('nInd').value;
  if(!val || val < 1){ alert('Введіть кількість критеріїв (мінімум 1)'); return; }
  nInd = val;
  buildMeta();
  show('step2');
  document.getElementById('reset-btn').style.display = '';
  document.getElementById('step2').scrollIntoView({behavior:'smooth',block:'start'});
  hide('step3'); hide('eq-panel');
}

/* ── Крок 2: назва + терми для кожного показника ── */
function buildMeta(){
  let h = '';
  for(let i=1;i<=nInd;i++){
    h += `
    <div class="meta-row" style="grid-column: 1 / -1; border:1.5px solid var(--sky3); border-radius:12px; padding:1rem 1.2rem; background:var(--sky)">
      <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:.75rem">
        <div style="flex:1;min-width:160px">
          <label>Назва критерію X<sub>${i}</sub></label>
          <input type="text" id="iname_${i}" placeholder="напр. Шрифтове оформлення" style="margin-top:4px">
        </div>
      </div>
      <div>
        <label style="font-size:12px;color:var(--text2);font-weight:600;display:block;margin-bottom:6px">
          Терми критерію X<sub>${i}</sub> <span style="font-weight:400;color:var(--text3)">(введіть через кому, напр.: низький, середній, високий)</span>
        </label>
        <input type="text" id="iterms_${i}" placeholder="терм1, терм2, терм3...">
      </div>
    </div>`;
  }
  document.getElementById('meta-grid').innerHTML = h;
}

function doStep2(){
  // Перевіряємо що всі поля назв і термів заповнені
  for(let i=1;i<=nInd;i++){
    const name = document.getElementById(`iname_${i}`).value.trim();
    const terms = document.getElementById(`iterms_${i}`).value.trim();
    if(!name){ alert(`Введіть назву для критерію X${i}`); return; }
    if(!terms){ alert(`Введіть терми для критерію X${i}`); return; }
  }
  buildMatrix();
  show('step3');
  document.getElementById('step3').scrollIntoView({behavior:'smooth',block:'start'});
  hide('eq-panel');
}

/* ── Крок 3: таблиця з випадаючими списками ── */
function getTerms(i){
  // Повертає масив термів для показника i (1-based)
  const raw = (document.getElementById(`iterms_${i}`) || {}).value || '';
  return raw.split(',').map(t => t.trim()).filter(Boolean);
}

function buildMatrix(){
  let h = '<thead><tr><th>#</th>';
  for(let i=1;i<=nInd;i++){
    const name = document.getElementById(`iname_${i}`).value.trim() || `Критерій ${i}`;
    h += `<th>X<sub>${i}</sub> <span style="font-weight:300;opacity:.7">(${name})</span></th>`;
  }
  h += '<th>Якість</th></tr></thead><tbody>';

  for(let r=0;r<6;r++){
    const bc  = BAND_CLASS[r];
    const col = BAND_COLOR[r];
    const q   = BAND_QUAL[r];
    h += `<tr class="band-${bc}"><td class="num">${r+1}</td>`;

    for(let i=1;i<=nInd;i++){
      const terms = getTerms(i);
      // Будуємо <select> з усіма термами + порожній варіант
      let opts = `<option value="">— оберіть —</option>`;
      terms.forEach(t => {
        opts += `<option value="${t}">${t}</option>`;
      });
      h += `<td>
        <select id="c_${r}_${i-1}" style="
          border:none;background:transparent;font-size:13px;
          font-family:'Nunito',sans-serif;color:var(--text);
          padding:9px 10px;width:100%;min-width:110px;outline:none;
          cursor:pointer;transition:background .15s;
          appearance:auto;
        " onchange="this.style.background=this.value?'rgba(30,170,224,.09)':'transparent'">
          ${opts}
        </select>
      </td>`;
    }

    h += `<td style="text-align:center;padding:6px 14px">
      <span style="display:inline-block;padding:3px 14px;border-radius:20px;
        font-size:12px;font-weight:700;letter-spacing:.04em;
        background:${bc==='low'?'rgba(217,79,79,.13)':bc==='med'?'rgba(212,135,10,.13)':'rgba(42,153,70,.13)'};
        color:${col}">${q}</span>
    </td></tr>`;
  }
  h += '</tbody>';
  document.getElementById('xi-table').innerHTML = h;
}

/* ── Генерація рівнянь ── */
function generate(){
  const grouped = { низька:[], середня:[], висока:[] };

  for(let r=0;r<6;r++){
    const q = BAND_QUAL[r];
    const row = [];
    for(let i=0;i<nInd;i++){
      const el = document.getElementById(`c_${r}_${i}`);
      const v = el ? el.value.trim() : '';
      row.push({ term:v, xi:i+1 });
    }
    if(row.some(c=>c.term)) grouped[q].push(row);
  }

  let html = '';
  ORDER.forEach(q => {
    if(!grouped[q].length) return;
    const bc  = q==='низька'?'low':q==='середня'?'med':'high';
    const col = q==='низька'?'var(--low)':q==='середня'?'var(--med)':'var(--high)';

    const lhs = `<span class="mu">μ</span><sub class="sub" style="color:${col}">${q}</sub>(X)`;

    const rowsHtml = grouped[q].map(row => {
      return row
        .filter(c => c.term)
        .map(c => `<span class="mu">μ</span><sub class="sub" style="color:var(--teal)">${c.term}</sub>(X<sub class="sub">${c.xi}</sub>)`)
        .join(`<span class="op-and"> ∧ </span>`);
    }).join(`<span class="op-or"> ∨ </span>`);

    html += `<div class="eq-block">
      <div class="eq-head">Рівняння для терму якості: <span style="color:${col}">${q}</span></div>
      <div class="eq-body">
        <div class="eq-line">${lhs}<span class="eq-eq">=</span>${rowsHtml}<span class="comma">,</span></div>
      </div>
    </div>`;
  });

  document.getElementById('eq-output').innerHTML = html || '<p style="color:var(--text3);font-size:13px">Немає даних. Заповніть матрицю.</p>';
  show('eq-panel');
  document.getElementById('eq-panel').scrollIntoView({behavior:'smooth',block:'start'});
}

/* ── Експорт ── */
function exportTxt(){
  const grouped = { низька:[], середня:[], висока:[] };
  for(let r=0;r<6;r++){
    const q = BAND_QUAL[r];
    const row=[];
    for(let i=0;i<nInd;i++){
      const el = document.getElementById(`c_${r}_${i}`);
      const v = el ? el.value.trim() : '';
      row.push({term:v,xi:i+1});
    }
    if(row.some(c=>c.term)) grouped[q].push(row);
  }
  let txt='НЕЧІТКІ ЛОГІЧНІ РІВНЯННЯ\n'+'='.repeat(50)+'\n\n';
  ORDER.forEach(q=>{
    if(!grouped[q].length) return;
    const rhs=grouped[q].map(row=>row.filter(c=>c.term).map(c=>`μ_${c.term}(X${c.xi})`).join(' ∧ ')).join(' ∨ ');
    txt+=`μ_${q}(X) = ${rhs},\n\n`;
  });
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='fuzzy_equations.txt';
  a.click();
}
/* ── Скинути все ── */
function resetAll(){
  document.getElementById('nInd').value = '';
  document.getElementById('meta-grid').innerHTML = '';
  document.getElementById('xi-table').innerHTML = '';
  document.getElementById('eq-output').innerHTML = '';
  hide('step2'); hide('step3'); hide('eq-panel');
  document.getElementById('reset-btn').style.display = 'none';
  nInd = 0;
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
